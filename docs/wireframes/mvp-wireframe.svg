<svg viewBox="0 0 1900 760" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="1900" height="760" fill="#ffffff"/>

  <!-- ===================== SCREEN 1: Splash ===================== -->
  <text x="20" y="25" font-size="16" font-weight="bold">1. Splash Screen</text>
  <rect x="20" y="40" width="260" height="560" rx="8" fill="none" stroke="#333" stroke-width="2"/>
  <rect x="90" y="180" width="120" height="120" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="90" y1="180" x2="210" y2="300" stroke="#333" stroke-width="1"/>
  <line x1="210" y1="180" x2="90" y2="300" stroke="#333" stroke-width="1"/>
  <text x="150" y="340" font-size="13" text-anchor="middle">APP NAME</text>
  <rect x="60" y="380" width="180" height="8" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <rect x="60" y="380" width="80" height="8" rx="4" fill="#ccc"/>
  <text x="150" y="410" font-size="11" text-anchor="middle" fill="#666">Loading...</text>

  <!-- Arrow -->
  <path d="M285 320 L320 320" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== SCREEN 2: Login (placeholder) ===================== -->
  <text x="325" y="25" font-size="16" font-weight="bold">2. Login</text>
  <text x="325" y="42" font-size="11" fill="#999">(placeholder, not functional in MVP)</text>
  <rect x="325" y="50" width="260" height="550" rx="8" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="370" y="80" width="170" height="40" fill="none" stroke="#999" stroke-width="1.5"/>
  <text x="455" y="105" font-size="11" text-anchor="middle" fill="#999">LOGO</text>
  <text x="455" y="150" font-size="13" text-anchor="middle" fill="#999">Login</text>
  <rect x="350" y="170" width="210" height="34" rx="4" fill="none" stroke="#999"/>
  <text x="360" y="191" font-size="11" fill="#999">E-Mail</text>
  <rect x="350" y="215" width="210" height="34" rx="4" fill="none" stroke="#999"/>
  <text x="360" y="236" font-size="11" fill="#999">Password</text>
  <rect x="350" y="265" width="210" height="34" rx="6" fill="#eee" stroke="#999"/>
  <text x="455" y="287" font-size="11" text-anchor="middle" fill="#999">Log In</text>

  <!-- Arrow -->
  <path d="M590 320 L625 320" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== SCREEN 3: Dashboard ===================== -->
  <text x="630" y="25" font-size="16" font-weight="bold">3. Dashboard</text>
  <rect x="630" y="40" width="280" height="560" rx="8" fill="none" stroke="#333" stroke-width="2"/>
  <rect x="630" y="40" width="280" height="42" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="770" y="66" font-size="12" text-anchor="middle">HEADER</text>

  <rect x="650" y="100" width="240" height="70" rx="6" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="660" y="120" font-size="10" fill="#666">Total Balance</text>
  <text x="660" y="148" font-size="16" font-weight="bold">XX.XXX,XX €</text>

  <rect x="650" y="182" width="115" height="50" rx="6" fill="none" stroke="#333" stroke-width="1"/>
  <text x="660" y="200" font-size="9" fill="#666">Income</text>
  <text x="660" y="220" font-size="12">X.XXX €</text>
  <rect x="775" y="182" width="115" height="50" rx="6" fill="none" stroke="#333" stroke-width="1"/>
  <text x="785" y="200" font-size="9" fill="#666">Expenses</text>
  <text x="785" y="220" font-size="12">X.XXX €</text>

  <text x="650" y="255" font-size="11" font-weight="bold">Forecast (next months)</text>
  <rect x="650" y="265" width="240" height="90" rx="6" fill="none" stroke="#333" stroke-width="1"/>
  <polyline points="660,335 690,310 720,320 750,295 780,300 810,280 840,290 870,275" fill="none" stroke="#333" stroke-width="1.5"/>

  <text x="650" y="378" font-size="11" font-weight="bold">Recent Transactions</text>
  <rect x="650" y="388" width="240" height="36" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="660" y="410" font-size="10">Rent &#8226; -850,00 €</text>
  <rect x="650" y="430" width="240" height="36" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="660" y="452" font-size="10">Salary &#8226; +2.400,00 €</text>
  <rect x="650" y="472" width="240" height="36" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="660" y="494" font-size="10">Groceries &#8226; -64,30 €</text>

  <circle cx="870" cy="555" r="22" fill="#eee" stroke="#333" stroke-width="1.5"/>
  <text x="870" y="562" font-size="18" text-anchor="middle">+</text>

  <rect x="630" y="558" width="280" height="42" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="690" y="584" font-size="10" text-anchor="middle">Home</text>
  <text x="770" y="584" font-size="10" text-anchor="middle">Profile</text>

  <!-- Arrow -->
  <path d="M915 320 L950 320" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== SCREEN 4: Sheet Detail ===================== -->
  <text x="955" y="25" font-size="16" font-weight="bold">4. Sheet Detail</text>
  <text x="955" y="42" font-size="11" fill="#999">(single default sheet, no list/switcher)</text>
  <rect x="955" y="50" width="280" height="550" rx="8" fill="none" stroke="#333" stroke-width="2"/>
  <rect x="955" y="50" width="280" height="42" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="1095" y="76" font-size="12" text-anchor="middle">HEADER &#8226; My Finances</text>

  <rect x="975" y="110" width="240" height="60" rx="6" fill="none" stroke="#333" stroke-width="1.5"/>
  <text x="985" y="128" font-size="9" fill="#666">Balance</text>
  <text x="985" y="152" font-size="15" font-weight="bold">X.XXX,XX €</text>

  <rect x="975" y="180" width="76" height="44" fill="none" stroke="#333" stroke-width="1"/>
  <text x="985" y="196" font-size="8" fill="#666">Income</text>
  <text x="985" y="214" font-size="10">X.XXX €</text>
  <rect x="1057" y="180" width="76" height="44" fill="none" stroke="#333" stroke-width="1"/>
  <text x="1067" y="196" font-size="8" fill="#666">Expenses</text>
  <text x="1067" y="214" font-size="10">X.XXX €</text>
  <rect x="1139" y="180" width="76" height="44" fill="none" stroke="#333" stroke-width="1"/>
  <text x="1149" y="196" font-size="8" fill="#666">Diff.</text>
  <text x="1149" y="214" font-size="10">X.XXX €</text>

  <text x="975" y="248" font-size="11" font-weight="bold">History (last 30 days)</text>
  <rect x="975" y="258" width="240" height="90" rx="6" fill="none" stroke="#333" stroke-width="1"/>
  <line x1="975" y1="258" x2="1215" y2="348" stroke="#ccc" stroke-width="1"/>
  <line x1="1215" y1="258" x2="975" y2="348" stroke="#ccc" stroke-width="1"/>

  <rect x="975" y="368" width="240" height="36" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="985" y="390" font-size="10">Transactions</text>
  <text x="1190" y="390" font-size="11">&#8250;</text>

  <rect x="975" y="412" width="240" height="36" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="985" y="434" font-size="10">History</text>
  <text x="1190" y="434" font-size="11">&#8250;</text>

  <circle cx="1195" cy="535" r="22" fill="#eee" stroke="#333" stroke-width="1.5"/>
  <text x="1195" y="542" font-size="18" text-anchor="middle">+</text>

  <rect x="955" y="558" width="280" height="42" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="1015" y="584" font-size="10" text-anchor="middle">Home</text>
  <text x="1095" y="584" font-size="10" text-anchor="middle">Sheet</text>
  <text x="1175" y="584" font-size="10" text-anchor="middle">Profile</text>

  <!-- Arrow -->
  <path d="M1240 320 L1275 320" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== SCREEN 5: New Transaction ===================== -->
  <text x="1280" y="25" font-size="16" font-weight="bold">5. New Transaction</text>
  <rect x="1280" y="50" width="280" height="550" rx="8" fill="none" stroke="#333" stroke-width="2"/>
  <rect x="1280" y="50" width="280" height="42" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="1420" y="76" font-size="12" text-anchor="middle">&#8249;  New Transaction</text>

  <rect x="1300" y="104" width="115" height="32" rx="6" fill="#eee" stroke="#333" stroke-width="1.5"/>
  <text x="1357" y="124" font-size="10" text-anchor="middle">Income</text>
  <rect x="1420" y="104" width="115" height="32" rx="6" fill="none" stroke="#333" stroke-width="1"/>
  <text x="1477" y="124" font-size="10" text-anchor="middle">Expense</text>

  <text x="1300" y="156" font-size="10" fill="#666">Amount</text>
  <rect x="1300" y="162" width="235" height="32" rx="4" fill="none" stroke="#333"/>
  <text x="1310" y="183" font-size="11">0,00 €</text>

  <text x="1300" y="212" font-size="10" fill="#666">Title</text>
  <rect x="1300" y="218" width="235" height="32" rx="4" fill="none" stroke="#333"/>
  <text x="1310" y="239" font-size="11" fill="#999">e.g. Salary</text>

  <text x="1300" y="268" font-size="10" fill="#666">Date</text>
  <rect x="1300" y="274" width="235" height="32" rx="4" fill="none" stroke="#333"/>
  <text x="1310" y="295" font-size="11" fill="#999">DD.MM.YYYY</text>

  <text x="1300" y="324" font-size="10" fill="#666">Type</text>
  <rect x="1300" y="330" width="115" height="32" rx="6" fill="#eee" stroke="#333" stroke-width="1.5"/>
  <text x="1357" y="350" font-size="10" text-anchor="middle">One-time</text>
  <rect x="1420" y="330" width="115" height="32" rx="6" fill="none" stroke="#333" stroke-width="1"/>
  <text x="1477" y="350" font-size="10" text-anchor="middle">Recurring</text>

  <text x="1300" y="382" font-size="9" fill="#999">(if Recurring) Frequency: weekly / monthly / quarterly / yearly</text>

  <rect x="1300" y="540" width="235" height="38" rx="6" fill="#333"/>
  <text x="1417" y="564" font-size="11" text-anchor="middle" fill="#fff">Save</text>

  <!-- Arrow -->
  <path d="M1565 320 L1600 320" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== SCREEN 6: Profile ===================== -->
  <text x="1605" y="25" font-size="16" font-weight="bold">6. Profile</text>
  <text x="1605" y="42" font-size="11" fill="#999">(trimmed: no currency/language/dark mode)</text>
  <rect x="1605" y="50" width="280" height="550" rx="8" fill="none" stroke="#333" stroke-width="2"/>
  <rect x="1605" y="50" width="280" height="42" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="1745" y="76" font-size="12" text-anchor="middle">HEADER</text>

  <circle cx="1745" cy="140" r="32" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="1723" y1="118" x2="1767" y2="162" stroke="#333" stroke-width="1"/>
  <line x1="1767" y1="118" x2="1723" y2="162" stroke="#333" stroke-width="1"/>
  <text x="1745" y="190" font-size="11" text-anchor="middle">Name</text>
  <text x="1745" y="206" font-size="10" text-anchor="middle" fill="#666">user@email.com</text>

  <rect x="1625" y="234" width="240" height="36" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="1635" y="256" font-size="10">Account</text>
  <text x="1840" y="256" font-size="11">&#8250;</text>

  <rect x="1625" y="278" width="240" height="36" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <text x="1635" y="300" font-size="10">Logout</text>

  <rect x="1605" y="558" width="280" height="42" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="1665" y="584" font-size="10" text-anchor="middle">Home</text>
  <text x="1745" y="584" font-size="10" text-anchor="middle">Sheet</text>
  <text x="1825" y="584" font-size="10" text-anchor="middle">Profile</text>

  <!-- Dropped screens note -->
  <rect x="20" y="640" width="1865" height="100" rx="8" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="35" y="665" font-size="12" font-weight="bold" fill="#666">Dropped for MVP (post-MVP / vision only):</text>
  <text x="35" y="690" font-size="11" fill="#666">Register &#183; Forgot Password &#183; Sheet List / Sheet Switching &#183; Create New Sheet &#183; Dashboard Empty State &#183; Categories field &#183; Settings screen (currency, language, dark mode, notifications, app lock)</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>
</svg>
